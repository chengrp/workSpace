<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 960px;
      height: 540px;
      background-color: #1a1a2e;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
    }

    .container {
      padding: 60px 80px;
    }

    h1 {
      font-size: 48px;
      color: #ffffff;
      margin-bottom: 30px;
      font-weight: bold;
    }

    p {
      font-size: 24px;
      color: #e0e0e0;
      line-height: 36px;
      margin-bottom: 20px;
    }

    .highlight {
      background-color: #16213e;
      border-radius: 8px;
      padding: 20px 30px;
      margin-top: 30px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>huashu-slides 技能测试</h1>
    <p>这是一个测试幻灯片，用于验证 html2pptx 脚本是否正常工作。</p>
    <p>如果看到这个 PPT，说明技能安装成功！</p>
    <div class="highlight">
      <p>测试通过</p>
    </div>
  </div>
</body>
</html>
